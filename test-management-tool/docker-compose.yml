version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: testmgmt-postgres
    environment:
      POSTGRES_DB: testmgmt
      POSTGRES_USER: testmgmt
      POSTGRES_PASSWORD: testmgmt123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testmgmt"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: testmgmt-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/testmgmt
      SPRING_DATASOURCE_USERNAME: testmgmt
      SPRING_DATASOURCE_PASSWORD: testmgmt123
      APP_JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      APP_JWT_EXPIRATION: 86400000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: testmgmt-frontend
    ports:
      - "3000:80"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
